name: SPI Auto Publisher

# Spec: SPI Auto Publisher Specification v1.0 (Candidate), Sec.12
# B-method: workflow creates artifacts only; it does not commit or push.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true/false)"
        required: false
        default: "false"
  push:
    branches: [main]
    paths:
      - "incoming/manifest.json"

permissions:
  contents: read

concurrency:
  group: spi-auto-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Publisher
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python publisher/publish.py --manifest incoming/manifest.json --dry-run
          else
            python publisher/publish.py --manifest incoming/manifest.json
          fi

      - name: Upload publication artifact
        uses: actions/upload-artifact@v4
        with:
          name: spi-publication-result
          path: |
            publication/
            archive/
            logs/
          if-no-files-found: warn
          retention-days: 30
